<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e23e7a" />
  <meta name="description" content="Browse and compare verified wedding-service vendors on Vivah Spot — venues, catering, decoration, photography, makeup & mehndi and DJ." />
  <title>Browse Wedding Vendors — Vivah Spot</title>
  <link rel="canonical" href="https://vivahspot.com/category.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Vivah Spot" />
  <meta property="og:title" content="Browse Wedding Vendors — Vivah Spot" />
  <meta property="og:description" content="Browse and compare verified wedding-service vendors on Vivah Spot." />
  <meta property="og:url" content="https://vivahspot.com/category.html" />
  <meta property="og:image" content="https://vivahspot.com/images/hero.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a href="#results" class="skip-link">Skip to results</a>
  <div class="app">

    <!-- App bar -->
    <header class="appbar">
      <a href="index.html" class="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24" class="ico"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="appbar-brand appbar-brand--center">
        <span class="page-title" id="cat-title">Services</span>
        <span class="page-sub" id="cat-sub">Find trusted vendors</span>
      </div>
      <span class="appbar-spacer" aria-hidden="true"></span>
    </header>

    <main class="screen" id="results">
      <!-- Sort / filter chips -->
      <div class="filterbar" id="sortbar" role="toolbar" aria-label="Sort vendors">
        <button class="chip active" data-sort="recommended">Recommended</button>
        <button class="chip" data-sort="rating">Top rated</button>
        <button class="chip" data-sort="price-asc">Price: low to high</button>
        <button class="chip" data-sort="price-desc">Price: high to low</button>
        <button class="chip" data-sort="verified">Verified only</button>
      </div>
      <!-- Category-specific speciality filters (photography / decoration) -->
      <div class="filterbar specbar" id="specbar" role="toolbar" aria-label="Filter by speciality" hidden></div>

      <div class="results-head">
        <span class="results-count" id="count">0 vendors</span>
      </div>

      <div class="cards" id="cards"></div>

      <!-- Empty state (hidden unless no results) -->
      <div class="empty" id="empty" hidden>
        <span class="empty-ico">
          <svg viewBox="0 0 24 24" class="ico"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
        </span>
        <h3>No vendors found</h3>
        <p>Try a different category or clear your filters.</p>
        <a class="btn btn-block" href="index.html" style="max-width:260px;margin:0 auto;">Back to home</a>
      </div>
    </main>

    <!-- Bottom tabs -->
    <nav class="tabbar">
      <a href="index.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg><span>Home</span></a>
      <a href="index.html#services" class="tab active"><svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Services</span></a>
      <a href="account/register.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>Register</span></a>
      <a href="account/login.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 4v16"/></svg><span>Login</span></a>
      <a href="index.html#about" class="tab"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.5" r="0.6" fill="currentColor"/></svg><span>About</span></a>
    </nav>
  </div>

  <script src="assets/data.js"></script>
  <script>
    window.IMG_BASE = "";
    const catSlug = vsParam("cat");
    const query = (vsParam("q") || "").trim().toLowerCase();
    const cat = catSlug ? vsCategory(catSlug) : null;

    // Title
    if (cat) {
      document.getElementById("cat-title").textContent = cat.name;
      document.getElementById("cat-sub").textContent = "Trusted " + cat.name.toLowerCase();
    } else if (query) {
      document.getElementById("cat-title").textContent = "Search";
      document.getElementById("cat-sub").textContent = '“' + query + '”';
    } else {
      document.getElementById("cat-title").textContent = "All Services";
      document.getElementById("cat-sub").textContent = "Every wedding vendor";
    }
    document.title = (cat ? cat.name : "Browse") + " — Vivah Spot";

    // Base set
    let base;
    if (cat) base = vsVendorsByCat(catSlug);
    else if (query) base = VENDORS.filter(v =>
      v.name.toLowerCase().includes(query) ||
      v.city.toLowerCase().includes(query) ||
      (vsCategory(v.cat) && vsCategory(v.cat).name.toLowerCase().includes(query)));
    else base = VENDORS.slice();

    let currentSort = "recommended";
    let currentSpec = null;
    function specFilter(list) {
      return currentSpec ? list.filter(v => v.tags && v.tags.includes(currentSpec)) : list;
    }
    function sorted(list) {
      const a = list.slice();
      if (currentSort === "rating") a.sort((x, y) => y.rating - x.rating);
      else if (currentSort === "price-asc") a.sort((x, y) => x.priceFrom - y.priceFrom);
      else if (currentSort === "price-desc") a.sort((x, y) => y.priceFrom - x.priceFrom);
      else if (currentSort === "verified") return a.filter(v => v.verified);
      return a;
    }

    function render() {
      const list = sorted(specFilter(base));
      const cards = document.getElementById("cards");
      const empty = document.getElementById("empty");
      document.getElementById("count").textContent =
        list.length + (list.length === 1 ? " vendor" : " vendors");
      if (!list.length) { cards.innerHTML = ""; empty.hidden = false; return; }
      empty.hidden = true;
      cards.innerHTML = list.map(vsVendorCard).join("");
      vsSyncFavs();
      vsInitCompare();
    }

    document.querySelectorAll("#sortbar .chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll("#sortbar .chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        currentSort = chip.dataset.sort;
        render();
      });
    });

    // Category-specific speciality filters (only photography / decoration have them)
    const specs = cat ? vsCatSpecialities(catSlug) : [];
    if (specs.length) {
      const sb = document.getElementById("specbar");
      sb.hidden = false;
      sb.innerHTML = `<button class="chip active" data-spec="">All</button>` +
        specs.map(s => `<button class="chip" data-spec="${s}">${s}</button>`).join("");
      sb.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          sb.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          currentSpec = chip.dataset.spec || null;
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
