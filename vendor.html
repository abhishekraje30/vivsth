<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e23e7a" />
  <meta name="description" content="Vendor details, packages, availability and reviews on Vivah Spot." />
  <title>Vendor — Vivah Spot</title>
  <link rel="canonical" href="https://vivahspot.com/vendor.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Vivah Spot" />
  <meta property="og:title" content="Vendor details — Vivah Spot" />
  <meta property="og:description" content="See packages, availability and reviews, then request a booking on Vivah Spot." />
  <meta property="og:image" content="https://vivahspot.com/images/hero.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="app">

    <header class="appbar">
      <a href="javascript:history.back()" class="back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" class="ico"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="appbar-brand appbar-brand--center">
        <span class="page-title">Vendor details</span>
      </div>
      <button class="back-btn" id="fav-btn" type="button" aria-label="Save to favourites" style="border-radius:50%;">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10Z"/></svg>
      </button>
    </header>

    <main class="screen screen-narrow" id="main"><!-- rendered by JS --></main>

    <!-- Sticky book bar -->
    <div class="bookbar" id="bookbar" hidden>
      <span class="bb-price">Starting from<strong id="bb-price">—</strong></span>
      <button class="btn btn-block" id="open-book" type="button">Book Now</button>
    </div>

    <!-- Booking modal -->
    <div class="modal-overlay" id="book-modal" role="dialog" aria-modal="true" aria-label="Book vendor">
      <div class="modal">
        <span class="modal-handle" aria-hidden="true"></span>
        <h3>Request a booking</h3>
        <p class="modal-sub" id="modal-vendor">—</p>
        <form id="book-form" class="register-form" onsubmit="return false;">
          <div class="field">
            <label for="b-date">Event date</label>
            <input id="b-date" type="date" required />
          </div>
          <div class="field">
            <label for="b-pkg">Package</label>
            <select id="b-pkg" required></select>
          </div>
          <div class="field">
            <label for="b-name">Your name</label>
            <input id="b-name" type="text" placeholder="Full name" required />
          </div>
          <div class="field">
            <label for="b-phone">Mobile number</label>
            <input id="b-phone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile" required />
          </div>
          <button type="submit" class="btn btn-block btn-lg">Confirm booking</button>
        </form>
      </div>
    </div>

    <div class="toast" id="toast">Booking request sent ✓</div>
  </div>

  <script src="assets/data.js"></script>
  <script>
    window.IMG_BASE = "";
    const v = vsVendor(vsParam("id"));
    const main = document.getElementById("main");

    if (!v) {
      document.getElementById("bookbar").hidden = true;
      main.innerHTML = `
        <div class="empty">
          <span class="empty-ico"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg></span>
          <h3>Vendor not found</h3>
          <p>This listing may have been removed.</p>
          <a class="btn btn-block" href="index.html" style="max-width:260px;margin:0 auto;">Back to home</a>
        </div>`;
    } else {
      document.title = v.name + " — Vivah Spot";
      const cat = vsCategory(v.cat);

      // Per-vendor SEO/social: point canonical + Open Graph at this specific vendor.
      (function () {
        const url = "https://vivahspot.com/vendor.html?id=" + v.id;
        const img = "https://vivahspot.com/images/" + v.gallery[0];
        const desc = `${v.name} · ${cat ? cat.name : ""} in ${v.city}. From ${vsFormatPrice(v.priceFrom)}/${v.unit} · ★ ${v.rating} (${v.reviews} reviews).`;
        const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute("content", val); };
        const canon = document.querySelector('link[rel="canonical"]'); if (canon) canon.setAttribute("href", url);
        document.querySelector('meta[name="description"]').setAttribute("content", desc);
        setMeta('meta[property="og:title"]', v.name + " — Vivah Spot");
        setMeta('meta[property="og:description"]', desc);
        setMeta('meta[property="og:image"]', img);
        let ogUrl = document.querySelector('meta[property="og:url"]');
        if (!ogUrl) { ogUrl = document.createElement("meta"); ogUrl.setAttribute("property", "og:url"); document.head.appendChild(ogUrl); }
        ogUrl.setAttribute("content", url);
      })();
      const reviews = [
        { name: "Priya & Rohan", stars: 5, text: "Absolutely wonderful experience from start to finish. Highly professional and exactly what we wanted for our big day." },
        { name: "Sneha Kulkarni", stars: 5, text: "Punctual, courteous and great value. Our guests are still talking about it!" },
        { name: "Amit Deshmukh", stars: 4, text: "Really good service overall. Communication could be a little quicker, but the quality was top-notch." },
      ];
      const stars = n => "★".repeat(n) + "☆".repeat(5 - n);

      main.innerHTML = `
        <div class="gallery">
          <div class="gallery-main"><img id="g-main" src="images/${v.gallery[0]}" alt="${v.name}" /></div>
          <div class="gallery-thumbs">
            ${v.gallery.map((g, i) => `<img src="images/${g}" alt="${v.name} photo ${i + 1}" class="${i === 0 ? "active" : ""}" data-src="images/${g}" />`).join("")}
          </div>
        </div>

        <div class="detail-head">
          <div>
            <h1>${v.name}</h1>
            ${vsBadgesHTML(v)}
            <div class="detail-meta">
              <span class="mi"><svg viewBox="0 0 24 24" class="ico"><path d="M12 21s-7-6.1-7-11a7 7 0 1 1 14 0c0 4.9-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>${v.city}</span>
              <span class="mi">${cat ? cat.name : ""}</span>
            </div>
          </div>
          <div class="detail-rating"><strong>${v.rating}</strong><span>${v.reviews} reviews</span></div>
        </div>

        <section class="detail-section">
          <h2>About</h2>
          <p>${v.about}</p>
        </section>

        <section class="detail-section">
          <h2>What's included</h2>
          <div class="amenities">${v.amenities.map(a => `<span class="amenity">${a}</span>`).join("")}</div>
        </section>

        <section class="detail-section">
          <h2>Contact ${v.name.split(" ")[0]}</h2>
          <div class="contact-row">
            <a class="contact-btn wa" id="c-wa" href="#" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" class="ico"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Z"/><path d="M8.5 7.5c.3 0 .6 0 .8.5l.8 1.8c.1.3 0 .5-.1.7l-.6.7c-.2.2-.2.4 0 .7a7 7 0 0 0 3 3c.3.2.5.2.7 0l.7-.7c.2-.2.4-.2.7-.1l1.8.8c.4.2.5.5.5.8 0 1-1 2-2.2 2A8.5 8.5 0 0 1 6.5 9.7C6.5 8.5 7.5 7.5 8.5 7.5Z" fill="#fff" stroke="none"/></svg>
              WhatsApp
            </a>
            <a class="contact-btn call" id="c-call" href="${vsTelLink(v)}">
              <svg viewBox="0 0 24 24" class="ico"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.4.55 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .55 3.4 1 1 0 0 1-.25 1Z"/></svg>
              Call
            </a>
            <button class="contact-btn inq" id="c-inq" type="button">
              <svg viewBox="0 0 24 24" class="ico"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
              Inquiry
            </button>
          </div>
        </section>

        <section class="detail-section">
          <h2>Packages</h2>
          <div class="pkg-list">
            ${v.packages.map(p => `
              <div class="pkg">
                <div class="pkg-top"><h4>${p.name}</h4><span class="pkg-price">${vsFormatPrice(p.price)}<small style="font-weight:600;color:var(--text-soft);font-size:0.72rem;"> / ${v.unit}</small></span></div>
                <ul class="pkg-features">${p.features.map(f => `<li>${f}</li>`).join("")}</ul>
              </div>`).join("")}
          </div>
        </section>

        <section class="detail-section">
          <h2>Check availability</h2>
          <div class="cal" id="cal"><!-- rendered by JS --></div>
          <div class="cal-legend">
            <span><i class="cdot avail"></i> Available</span>
            <span><i class="cdot booked"></i> Booked</span>
            <span class="cal-hint">Tap an available date to request it</span>
          </div>
        </section>

        <section class="detail-section">
          <div class="reviews-head">
            <h2>Reviews</h2>
            <span class="reviews-avg" id="rev-avg"></span>
          </div>
          <div id="reviews-list"><!-- rendered by JS --></div>
          <button class="btn btn-outline" id="rev-add-btn" type="button" style="margin-top:0.75rem;">✍ Write a review</button>
          <form id="rev-form" class="register-form" hidden style="margin-top:1rem;">
            <div class="field">
              <label>Your rating</label>
              <div class="star-input" id="star-input" role="radiogroup" aria-label="Your rating">
                ${[1, 2, 3, 4, 5].map(n => `<button type="button" class="star" data-star="${n}" aria-label="${n} star">★</button>`).join("")}
              </div>
            </div>
            <div class="field"><label for="rev-name">Your name</label><input id="rev-name" type="text" placeholder="Full name" required /></div>
            <div class="field"><label for="rev-text">Your review</label><textarea id="rev-text" rows="3" placeholder="Share your experience…" required></textarea></div>
            <div class="field"><label for="rev-photo">Add a photo (optional)</label><input id="rev-photo" type="file" accept="image/*" /></div>
            <button type="submit" class="btn btn-block btn-lg">Submit review</button>
          </form>
        </section>

        <div id="rails"><!-- recommendation rails rendered by JS --></div>

        <div style="height:0.5rem;"></div>
      `;

      // Gallery thumb switching
      const gMain = document.getElementById("g-main");
      document.querySelectorAll(".gallery-thumbs img").forEach(t => {
        t.addEventListener("click", () => {
          gMain.src = t.dataset.src;
          document.querySelectorAll(".gallery-thumbs img").forEach(x => x.classList.remove("active"));
          t.classList.add("active");
        });
      });

      // Book bar
      const bar = document.getElementById("bookbar");
      bar.hidden = false;
      document.getElementById("bb-price").textContent = vsFormatPrice(v.priceFrom) + " / " + v.unit;

      // Favourite toggle (header heart)
      const favBtn = document.getElementById("fav-btn");
      const syncFav = () => favBtn.classList.toggle("active", vsIsFav(v.id));
      favBtn.style.color = "var(--accent)";
      syncFav();
      if (vsIsFav(v.id)) favBtn.querySelector(".ico").style.fill = "var(--accent)";
      favBtn.addEventListener("click", () => {
        vsToggleFav(null, v.id); syncFav();
        favBtn.querySelector(".ico").style.fill = vsIsFav(v.id) ? "var(--accent)" : "none";
      });

      // Booking modal
      const modal = document.getElementById("book-modal");
      const pkgSel = document.getElementById("b-pkg");
      pkgSel.innerHTML = v.packages.map(p => `<option value="${p.name}">${p.name} — ${vsFormatPrice(p.price)}</option>`).join("");
      document.getElementById("modal-vendor").textContent = v.name + " · " + (cat ? cat.name : "");
      document.getElementById("open-book").addEventListener("click", () => modal.classList.add("open"));
      modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("open"); });

      document.getElementById("book-form").addEventListener("submit", () => {
        const date = document.getElementById("b-date").value;
        const name = document.getElementById("b-name").value.trim();
        const phone = document.getElementById("b-phone").value.trim();
        if (!date || !name || phone.length < 10) return;
        // Save booking to localStorage (no backend)
        const bookings = JSON.parse(localStorage.getItem("vs_bookings") || "[]");
        bookings.unshift({
          vendorId: v.id, vendor: v.name, img: v.gallery[0], category: cat ? cat.name : "",
          date, pkg: pkgSel.value, status: "pending"
        });
        localStorage.setItem("vs_bookings", JSON.stringify(bookings));
        modal.classList.remove("open");
        const toast = document.getElementById("toast");
        toast.textContent = "Booking requested ✓  See My Bookings";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2600);
        document.getElementById("book-form").reset();
        pkgSel.innerHTML = v.packages.map(p => `<option value="${p.name}">${p.name} — ${vsFormatPrice(p.price)}</option>`).join("");
        if (typeof renderCal === "function") renderCal(); // reflect the new booking on the calendar
        vsTrack(v.id, "bookings");
      });

      document.addEventListener("keydown", e => { if (e.key === "Escape") modal.classList.remove("open"); });

      /* ============ Feature enhancements ============ */

      // Profile-view tracking (feeds the future vendor dashboard)
      vsTrack(v.id, "views");

      // Shared toast helper
      const toastEl = document.getElementById("toast");
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 2600);
      }

      // ---------- Quick contact: WhatsApp / Call / Inquiry ----------
      const waBtn = document.getElementById("c-wa");
      waBtn.href = vsWaLink(v, `Hi, I'm interested in ${v.name} (${cat ? cat.name : ""}) on Vivah Spot. Could you share availability and pricing?`);
      waBtn.addEventListener("click", () => vsTrack(v.id, "whatsapp"));
      document.getElementById("c-call").addEventListener("click", () => vsTrack(v.id, "calls"));
      document.getElementById("c-inq").addEventListener("click", () => {
        vsTrack(v.id, "leads");
        const leads = JSON.parse(localStorage.getItem("vs_inquiries") || "[]");
        leads.unshift({ vendorId: v.id, vendor: v.name, at: new Date().toISOString() });
        localStorage.setItem("vs_inquiries", JSON.stringify(leads));
        showToast("Inquiry sent ✓  The vendor will get back to you");
      });

      // ---------- Availability calendar ----------
      const calEl = document.getElementById("cal");
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let calY = today.getFullYear(), calM = today.getMonth();
      const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      const pad2 = n => String(n).padStart(2, "0");
      const isoOf = (y, m, d) => `${y}-${pad2(m + 1)}-${pad2(d)}`;
      function renderCal() {
        const first = new Date(calY, calM, 1).getDay();
        const days = new Date(calY, calM + 1, 0).getDate();
        const atStart = (calY === today.getFullYear() && calM === today.getMonth());
        let cells = "";
        for (let i = 0; i < first; i++) cells += `<span class="cal-cell empty"></span>`;
        for (let d = 1; d <= days; d++) {
          const dateISO = isoOf(calY, calM, d);
          const past = new Date(calY, calM, d) < today;
          if (past) { cells += `<span class="cal-cell past">${d}</span>`; continue; }
          const booked = vsIsBooked(v.id, dateISO);
          cells += `<button type="button" class="cal-cell ${booked ? "booked" : "avail"}" data-date="${dateISO}" ${booked ? "disabled" : ""}>${d}</button>`;
        }
        calEl.innerHTML = `
          <div class="cal-nav">
            <button type="button" class="cal-arrow" id="cal-prev" ${atStart ? "disabled" : ""} aria-label="Previous month">‹</button>
            <span class="cal-title">${MONTHS[calM]} ${calY}</span>
            <button type="button" class="cal-arrow" id="cal-next" aria-label="Next month">›</button>
          </div>
          <div class="cal-grid">
            ${["S", "M", "T", "W", "T", "F", "S"].map(d => `<span class="cal-dow">${d}</span>`).join("")}
            ${cells}
          </div>`;
        const prevB = document.getElementById("cal-prev");
        if (prevB && !atStart) prevB.addEventListener("click", () => { calM--; if (calM < 0) { calM = 11; calY--; } renderCal(); });
        document.getElementById("cal-next").addEventListener("click", () => { calM++; if (calM > 11) { calM = 0; calY++; } renderCal(); });
        calEl.querySelectorAll(".cal-cell.avail").forEach(c => {
          c.addEventListener("click", () => {
            document.getElementById("b-date").value = c.dataset.date;
            modal.classList.add("open");
          });
        });
      }
      renderCal();

      // ---------- Reviews & ratings ----------
      const revListEl = document.getElementById("reviews-list");
      const revAvgEl = document.getElementById("rev-avg");
      const allReviews = () => [...vsGetReviews(v.id), ...reviews];
      function renderReviews() {
        const all = allReviews();
        const avg = all.reduce((s, r) => s + r.stars, 0) / all.length;
        revAvgEl.textContent = `★ ${avg.toFixed(1)} · ${all.length} review${all.length === 1 ? "" : "s"}`;
        revListEl.innerHTML = all.map(r => `
          <div class="review">
            <div class="review-top">
              <span class="review-avatar">${(r.name || "?")[0].toUpperCase()}</span>
              <div><div class="review-name">${r.name}${r.mine ? ` <span class="review-you">You</span>` : ""}</div><div class="review-stars">${stars(r.stars)}</div></div>
            </div>
            <p>${r.text}</p>
            ${r.photo ? `<img class="review-photo" src="${r.photo}" alt="Review photo" loading="lazy" />` : ""}
          </div>`).join("");
      }
      renderReviews();

      const revForm = document.getElementById("rev-form");
      const revAddBtn = document.getElementById("rev-add-btn");
      let revStars = 0;
      const starBtns = document.querySelectorAll("#star-input .star");
      const paintStars = n => starBtns.forEach(b => b.classList.toggle("on", +b.dataset.star <= n));
      starBtns.forEach(b => {
        b.addEventListener("mouseenter", () => paintStars(+b.dataset.star));
        b.addEventListener("click", () => { revStars = +b.dataset.star; paintStars(revStars); });
      });
      document.getElementById("star-input").addEventListener("mouseleave", () => paintStars(revStars));
      revAddBtn.addEventListener("click", () => {
        revForm.hidden = !revForm.hidden;
        if (!revForm.hidden) revForm.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
      revForm.addEventListener("submit", () => {
        const name = document.getElementById("rev-name").value.trim();
        const text = document.getElementById("rev-text").value.trim();
        if (!revStars) { showToast("Please pick a star rating"); return; }
        if (!name || !text) return;
        const save = photo => {
          vsAddReview(v.id, { name, stars: revStars, text, photo: photo || "", mine: true });
          renderReviews();
          revForm.reset(); revStars = 0; paintStars(0); revForm.hidden = true;
          showToast("Thanks! Your review was added ✓");
        };
        const file = document.getElementById("rev-photo").files[0];
        if (file) { const fr = new FileReader(); fr.onload = () => save(fr.result); fr.readAsDataURL(file); }
        else { save(""); }
      });

      // ---------- Recommendation rails ----------
      const cityName = vsCityKey(v.city);
      document.getElementById("rails").innerHTML =
        vsRailHTML("Similar vendors", vsVendorsByCat(v.cat).filter(x => x.id !== v.id).slice(0, 8)) +
        vsRailHTML("Top rated in " + cityName, vsTopRatedInCity(v, 8)) +
        vsRailHTML("People also viewed", vsAlsoViewed(v, 8)) +
        vsRailHTML("Trending now", vsTrending(v.id, 8));
      vsSyncFavs();
      vsInitCompare();
    }
  </script>
</body>
</html>
