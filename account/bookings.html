<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e23e7a" />
  <meta name="description" content="Your wedding-service bookings on Vivah Spot." />
  <meta name="robots" content="noindex, follow" />
  <title>My Bookings — Vivah Spot</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="app">
    <header class="appbar">
      <a href="profile.html" class="back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" class="ico"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="appbar-brand appbar-brand--center">
        <span class="page-title">My Bookings</span>
      </div>
      <span class="appbar-spacer" aria-hidden="true"></span>
    </header>

    <main class="screen">
      <div style="padding-top:1rem;"></div>
      <div id="list"></div>

      <div class="empty" id="empty" hidden>
        <span class="empty-ico">
          <svg viewBox="0 0 24 24" class="ico"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
        </span>
        <h3>No bookings yet</h3>
        <p>Find a vendor you love and request a booking — it'll show up here.</p>
        <a class="btn btn-block" href="../index.html#services" style="max-width:260px;margin:0 auto;">Browse services</a>
      </div>
    </main>

    <nav class="tabbar">
      <a href="../index.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg><span>Home</span></a>
      <a href="../index.html#services" class="tab"><svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Services</span></a>
      <a href="register.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>Register</span></a>
      <a href="login.html" class="tab"><svg viewBox="0 0 24 24" class="ico"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 4v16"/></svg><span>Login</span></a>
      <a href="../index.html#about" class="tab"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.5" r="0.6" fill="currentColor"/></svg><span>About</span></a>
    </nav>
  </div>

  <script src="../assets/data.js"></script>
  <script>
    window.IMG_BASE = "../";
    const bookings = JSON.parse(localStorage.getItem("vs_bookings") || "[]");
    const list = document.getElementById("list");
    if (!bookings.length) {
      document.getElementById("empty").hidden = false;
    } else {
      list.innerHTML = bookings.map(b => `
        <a class="list-row" href="../vendor.html?id=${b.vendorId}">
          <img src="../images/${b.img}" alt="${b.vendor}" />
          <div class="lr-body">
            <h4>${b.vendor}</h4>
            <p>${b.category} · ${b.pkg}</p>
            <p>📅 ${b.date}</p>
          </div>
          <span class="status ${b.status}">${b.status === "confirmed" ? "Confirmed" : "Pending"}</span>
        </a>`).join("");
    }
  </script>
</body>
</html>
